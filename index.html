<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美丽的翟女士 母亲节快乐 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(160deg, #1a0f1a 0%, #2d1b2e 25%, #4a2c3a 50%, #2d1b2e 75%, #1a0f1a 100%);
            font-family: 'Georgia', 'Songti SC', 'STSong', 'SimSun', serif;
            overflow-x: hidden;
            padding: 24px 16px;
        }

        /* ===== 信封开场 ===== */
        .env-overlay {
            position: fixed;
            inset: 0;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(160deg, #1a0f1a, #2d1b2e, #4a2c3a);
            transition: opacity 0.8s ease, transform 0.8s ease;
            cursor: pointer;
        }
        .env-overlay.hidden {
            opacity: 0;
            transform: scale(1.08);
            pointer-events: none;
        }

        .env-scene {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            animation: envAppear 0.8s ease-out;
        }
        @keyframes envAppear {
            0%   { transform: scale(0.6) translateY(40px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .env-box {
            position: relative;
            width: 300px;
            height: 200px;
            cursor: pointer;
        }

        /* 信封内部（ flap 打开后露出的部分） */
        .env-inner {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 58%;
            background: linear-gradient(180deg, #dcc8b0, #e8d5c0);
            border-radius: 8px 8px 0 0;
            z-index: 0;
        }

        /* 信封主体下半部 */
        .env-bottom {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 48%;
            background: #f0dcc8;
            border-radius: 0 0 8px 8px;
            z-index: 1;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.04);
        }
        /* 底部装饰边 */
        .env-bottom::after {
            content: '';
            position: absolute;
            top: 0; left: 10%;
            width: 80%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200,170,150,0.4), transparent);
        }

        /* 信封封口 flap — 三角形 */
        .env-flap {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 58%;
            background: linear-gradient(160deg, #f5e6d3, #f0dcc8, #e8d5c0);
            clip-path: polygon(0 0, 50% 100%, 100% 0);
            transform-origin: top center;
            transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 4;
        }
        .env-box.open .env-flap {
            transform: rotateX(180deg);
        }

        /* 封口上的爱心封缄 */
        .env-seal {
            position: absolute;
            top: 28%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            z-index: 5;
            filter: drop-shadow(0 2px 6px rgba(233,30,99,0.3));
            animation: sealBeat 1.8s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes sealBeat {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50%      { transform: translate(-50%, -50%) scale(1.15); }
        }

        /* 里面的信 */
        .env-letter {
            position: absolute;
            left: 12%;
            bottom: 8%;
            width: 76%;
            height: 62%;
            background: linear-gradient(160deg, #fffdf7, #fff8f0, #fef5e8);
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.15s;
            transform: translateY(0);
            border: 1px solid rgba(200,170,150,0.15);
        }
        .env-box.open .env-letter {
            transform: translateY(-42px);
        }
        .env-letter .env-l-icon {
            font-size: 36px;
            line-height: 1;
        }
        .env-letter .env-l-to {
            font-size: 18px;
            color: #c2185b;
            letter-spacing: 4px;
            font-weight: 600;
        }
        .env-letter .env-l-sub {
            font-size: 12px;
            color: #bbb;
            letter-spacing: 2px;
        }

        /* 信封外部装饰线 */
        .env-box::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid rgba(200,170,150,0.15);
            border-radius: 10px;
            pointer-events: none;
            z-index: 6;
        }

        .env-hint {
            font-size: 16px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 4px;
            animation: hintPulse 2s ease-in-out infinite;
        }
        @keyframes hintPulse {
            0%, 100% { opacity: 0.4; transform: translateY(0); }
            50%      { opacity: 0.8; transform: translateY(-4px); }
        }

        .env-click-ripple {
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid rgba(233,30,99,0.25);
            pointer-events: none;
            z-index: 10;
            animation: envRipple 0.8s ease-out forwards;
        }
        @keyframes envRipple {
            0%   { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* ===== 背景星星 ===== */
        .star {
            position: fixed;
            border-radius: 50%;
            background: #fff;
            pointer-events: none;
            z-index: 0;
            animation: twinkle linear forwards;
        }
        @keyframes twinkle {
            0%   { transform: scale(0); opacity: 0; }
            30%  { transform: scale(1); opacity: 0.9; }
            70%  { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* ===== 飘落花瓣 ===== */
        .petal {
            position: fixed;
            top: -50px;
            opacity: 0;
            pointer-events: none;
            z-index: 0;
            user-select: none;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0%   { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
            10%  { opacity: 0.8; }
            85%  { opacity: 0.4; }
            100% { transform: translateY(110vh) rotate(800deg) translateX(150px); opacity: 0; }
        }

        /* ===== 浮动光晕 ===== */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(circle, rgba(233,30,99,0.15), transparent 70%);
            animation: orbFloat linear infinite;
        }
        @keyframes orbFloat {
            0%   { transform: translateY(0) scale(0.8); opacity: 0; }
            20%  { opacity: 1; }
            80%  { opacity: 0.6; }
            100% { transform: translateY(-300px) scale(1.8); opacity: 0; }
        }

        /* ===== 主容器 ===== */
        .card-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 680px;
        }

        /* ===== 彩带 ===== */
        .ribbon {
            position: relative;
            width: 100%;
            height: 34px;
            background: linear-gradient(135deg, #e91e63, #c2185b, #ad1457, #c2185b, #e91e63);
            background-size: 200% 100%;
            animation: ribbonShimmer 4s ease-in-out infinite;
            border-radius: 17px 17px 0 0;
            box-shadow: 0 4px 25px rgba(233,30,99,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 13px;
            color: rgba(255,255,255,0.9);
            letter-spacing: 6px;
            font-family: Arial, sans-serif;
            z-index: 2;
            overflow: hidden;
        }
        @keyframes ribbonShimmer {
            0%, 100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }
        .ribbon::before, .ribbon::after {
            content: '';
            position: absolute;
            bottom: -12px;
            width: 0;
            height: 0;
            border-style: solid;
        }
        .ribbon::before { left: 0; border-width: 0 0 12px 16px; border-color: transparent transparent transparent #880e4f; }
        .ribbon::after  { right: 0; border-width: 0 16px 12px 0; border-color: transparent #880e4f transparent transparent; }
        .ribbon .r-star {
            font-size: 16px;
            animation: rSpin 4s linear infinite;
        }
        @keyframes rSpin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== 卡片主体 ===== */
        .card {
            background: rgba(255, 248, 250, 0.96);
            backdrop-filter: blur(16px);
            border-radius: 0 0 32px 32px;
            padding: 36px 40px 40px;
            box-shadow: 0 20px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, rgba(233,30,99,0.06), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .card::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: -40px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(240,98,146,0.05), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* ===== 内框 ===== */
        .inner {
            border: 1.5px solid rgba(233,30,99,0.10);
            border-radius: 20px;
            padding: 24px 24px 18px;
            position: relative;
        }

        /* ===== 顶部装饰花环 ===== */
        .garland {
            font-size: 30px;
            letter-spacing: 6px;
            line-height: 1.4;
        }
        .garland span {
            display: inline-block;
            animation: garlandSway 3s ease-in-out infinite;
        }
        .garland span:nth-child(1) { animation-delay: 0.0s; }
        .garland span:nth-child(2) { animation-delay: 0.15s; }
        .garland span:nth-child(3) { animation-delay: 0.3s; }
        .garland span:nth-child(4) { animation-delay: 0.45s; }
        .garland span:nth-child(5) { animation-delay: 0.6s; }
        .garland span:nth-child(6) { animation-delay: 0.75s; }
        .garland span:nth-child(7) { animation-delay: 0.9s; }
        .garland span:nth-child(8) { animation-delay: 1.05s; }
        .garland span:nth-child(9) { animation-delay: 1.2s; }
        @keyframes garlandSway {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-6px); }
        }

        /* ===== 主标题 ===== */
        .hero-name {
            font-size: 40px;
            font-weight: 700;
            background: linear-gradient(135deg, #ad1457, #e91e63, #f06292, #e91e63);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease-in-out infinite;
            letter-spacing: 6px;
            margin: 2px 0 0;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% center; }
            50%      { background-position: 100% center; }
        }
        .hero-sub {
            font-size: 18px;
            color: #ad1457;
            letter-spacing: 8px;
            margin: 0 0 2px;
        }
        .hero-en {
            font-size: 14px;
            color: #e91e63;
            letter-spacing: 4px;
            opacity: 0.45;
            font-style: italic;
            margin-bottom: 8px;
        }

        /* ===== 分隔装饰 ===== */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 12px 0 16px;
        }
        .divider .line {
            flex: 1;
            max-width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #f06292, transparent);
        }
        .divider .icon { color: #e91e63; font-size: 13px; opacity: 0.5; }

        /* ===== 双列布局（相框 + 蜡烛） ===== */
        .dual-panel {
            display: flex;
            gap: 24px;
            justify-content: center;
            align-items: center;
            margin: 4px 0 16px;
            flex-wrap: wrap;
        }

        /* ===== 相框 ===== */
        .photo-frame {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 0 0 2px #f8bbd0, 0 8px 30px rgba(233,30,99,0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0);
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            position: relative;
            flex-shrink: 0;
        }
        .photo-frame:hover {
            transform: scale(1.06);
            box-shadow: 0 0 0 2px #f48fb1, 0 12px 40px rgba(233,30,99,0.3);
        }
        .photo-frame .ph-icon {
            font-size: 48px;
            opacity: 0.6;
            transition: opacity 0.3s;
            line-height: 1;
        }
        .photo-frame .ph-label {
            font-size: 11px;
            color: #c2185b;
            opacity: 0.5;
            margin-top: 2px;
            letter-spacing: 1px;
        }
        .photo-frame:hover .ph-icon { opacity: 0.9; }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .photo-frame.has-photo img { display: block; }
        .photo-frame.has-photo .ph-icon,
        .photo-frame.has-photo .ph-label { display: none; }

        /* ===== 蜡烛 ===== */
        .candle-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            user-select: none;
            flex-shrink: 0;
        }
        .candle-body {
            position: relative;
            width: 30px;
            height: 70px;
            background: linear-gradient(180deg, #fff5f5, #fce4ec, #f8bbd0);
            border-radius: 4px 4px 6px 6px;
            box-shadow: inset -3px 0 8px rgba(0,0,0,0.05);
            border: 1px solid rgba(233,30,99,0.1);
        }
        .candle-wick {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 8px;
            background: #666;
            border-radius: 1px;
        }
        .candle-flame {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 18px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            background: radial-gradient(ellipse at 40% 30%, #fff9c4, #ffd54f 30%, #ff8a65 60%, transparent);
            box-shadow: 0 0 20px rgba(255,180,0,0.5), 0 0 40px rgba(255,140,0,0.2);
            opacity: 0;
            transition: opacity 0.5s ease;
            animation: flicker 1.5s ease-in-out infinite;
        }
        .candle-area.lit .candle-flame { opacity: 1; }
        @keyframes flicker {
            0%, 100% { transform: translateX(-50%) scale(1) rotate(0deg); }
            25%  { transform: translateX(-50%) scale(1.05, 0.95) rotate(-2deg); }
            50%  { transform: translateX(-50%) scale(0.95, 1.05) rotate(1deg); }
            75%  { transform: translateX(-50%) scale(1.03, 0.97) rotate(-1deg); }
        }
        .candle-glow-ring {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,200,50,0.2), transparent 70%);
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .candle-area.lit .candle-glow-ring { opacity: 1; }
        .candle-label {
            font-size: 11px;
            color: #c2185b;
            opacity: 0.5;
            margin-top: 4px;
            letter-spacing: 1px;
        }
        .candle-area.lit .candle-label { opacity: 0.8; }

        /* ===== 祝福短句 ===== */
        .blessing {
            margin: 6px 0 10px;
            padding: 0 4px;
        }
        .blessing .line {
            font-size: 18px;
            line-height: 1.9;
            color: #3d2a36;
            letter-spacing: 1px;
        }
        .blessing .line.highlight {
            font-size: 20px;
            color: #c2185b;
            font-weight: 600;
        }

        /* ===== 爱心矩阵 ===== */
        .heart-grid {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin: 10px 0 6px;
        }
        .heart-grid .hg-item {
            font-size: 20px;
            animation: hgFloat 2.5s ease-in-out infinite;
            cursor: default;
            transition: transform 0.2s;
        }
        .heart-grid .hg-item:nth-child(1)  { animation-delay: 0.00s; }
        .heart-grid .hg-item:nth-child(2)  { animation-delay: 0.15s; }
        .heart-grid .hg-item:nth-child(3)  { animation-delay: 0.30s; }
        .heart-grid .hg-item:nth-child(4)  { animation-delay: 0.45s; }
        .heart-grid .hg-item:nth-child(5)  { animation-delay: 0.60s; }
        .heart-grid .hg-item:nth-child(6)  { animation-delay: 0.75s; }
        .heart-grid .hg-item:nth-child(7)  { animation-delay: 0.90s; }
        .heart-grid .hg-item:nth-child(8)  { animation-delay: 1.05s; }
        .heart-grid .hg-item:nth-child(9)  { animation-delay: 1.20s; }
        .heart-grid .hg-item:nth-child(10) { animation-delay: 1.35s; }
        .heart-grid .hg-item:nth-child(11) { animation-delay: 1.50s; }
        .heart-grid .hg-item:nth-child(12) { animation-delay: 1.65s; }
        @keyframes hgFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50%      { transform: translateY(-8px) scale(1.08); }
        }

        /* ===== CSS 康乃馨 ===== */
        .carnation-wrap {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }
        .carnation {
            --size: 72px;
            width: var(--size);
            height: var(--size);
            border-radius: 50%;
            position: relative;
            background:
                /* 花瓣高光 */
                radial-gradient(ellipse 22% 18% at 28% 20%, rgba(255,255,255,0.55) 0%, transparent 100%),
                radial-gradient(ellipse 18% 22% at 72% 16%, rgba(255,255,255,0.40) 0%, transparent 100%),
                radial-gradient(ellipse 16% 20% at 20% 72%, rgba(255,255,255,0.30) 0%, transparent 100%),
                radial-gradient(ellipse 20% 16% at 78% 76%, rgba(255,255,255,0.25) 0%, transparent 100%),
                radial-gradient(ellipse 28% 12% at 50% 12%, rgba(255,255,255,0.35) 0%, transparent 100%),
                /* 中间花瓣层次 */
                radial-gradient(ellipse 14% 26% at 14% 50%, rgba(248,187,208,0.5) 0%, transparent 100%),
                radial-gradient(ellipse 14% 26% at 86% 50%, rgba(248,187,208,0.4) 0%, transparent 100%),
                /* 主色调渐变：浅粉中心 → 深粉边缘 */
                radial-gradient(circle at 45% 38%, #fce4ec 5%, #f8bbd0 20%, #f48fb1 42%, #f06292 62%, #e91e63 80%, #c2185b 100%);
            box-shadow:
                0 2px 12px rgba(233,30,99,0.2),
                0 6px 24px rgba(233,30,99,0.12),
                inset 0 -4px 10px rgba(136,14,79,0.12);
            animation: carnSway 3.5s ease-in-out infinite;
            cursor: pointer;
            z-index: 1;
        }
        .carnation::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: conic-gradient(
                transparent 0deg,   rgba(248,187,208,0.25) 12deg,  transparent 24deg,
                rgba(240,98,146,0.2) 36deg,  transparent 48deg,
                rgba(248,187,208,0.25) 60deg,  transparent 72deg,
                rgba(240,98,146,0.15) 84deg,  transparent 96deg,
                rgba(248,187,208,0.2)  108deg, transparent 120deg,
                rgba(240,98,146,0.2)  132deg, transparent 144deg,
                rgba(248,187,208,0.25) 156deg, transparent 168deg,
                rgba(240,98,146,0.15) 180deg, transparent 192deg,
                rgba(248,187,208,0.2)  204deg, transparent 216deg,
                rgba(240,98,146,0.2)  228deg, transparent 240deg,
                rgba(248,187,208,0.25) 252deg, transparent 264deg,
                rgba(240,98,146,0.15) 276deg, transparent 288deg,
                rgba(248,187,208,0.2)  300deg, transparent 312deg,
                rgba(240,98,146,0.2)  324deg, transparent 336deg,
                rgba(248,187,208,0.25) 348deg, transparent 360deg
            );
            z-index: -1;
            animation: carnRuffle 8s linear infinite;
        }
        .carnation-stem {
            width: 3px;
            height: 30px;
            background: linear-gradient(180deg, #66bb6a, #388e3c);
            border-radius: 2px;
            margin-top: -3px;
            position: relative;
        }
        .carnation-stem::before {
            content: '';
            position: absolute;
            left: -4px;
            top: 10px;
            width: 14px;
            height: 7px;
            background: #81c784;
            border-radius: 0 50% 50% 50%;
            transform: rotate(-20deg);
        }
        .carnation-stem::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 18px;
            width: 12px;
            height: 6px;
            background: #a5d6a7;
            border-radius: 50% 0 50% 50%;
            transform: rotate(20deg);
        }
        .carnation-sm .carnation { --size: 48px; }
        .carnation-sm .carnation-stem { height: 22px; }
        .carnation-sm .carnation-stem::before,
        .carnation-sm .carnation-stem::after { display: none; }

        @keyframes carnSway {
            0%, 100% { transform: rotate(-2deg); }
            50%      { transform: rotate(2deg); }
        }
        @keyframes carnRuffle {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .carnation:hover {
            animation: carnPop 0.5s ease forwards;
        }
        @keyframes carnPop {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.25); }
            100% { transform: scale(1.08); }
        }

        /* ===== 康乃馨花圃 ===== */
        .carnation-garden {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 10px 0 4px;
            padding: 14px 12px;
            background: linear-gradient(135deg, rgba(248,187,208,0.12), rgba(240,98,146,0.06));
            border-radius: 18px;
            border: 1px solid rgba(233,30,99,0.06);
        }

        /* ===== 花园 ===== */
        .garden {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0 4px;
            padding: 12px 10px;
            background: rgba(248,187,208,0.15);
            border-radius: 16px;
            border: 1px solid rgba(233,30,99,0.06);
        }

        /* ===== 签名 ===== */
        .sig {
            margin-top: 14px;
            text-align: right;
            padding-right: 6px;
        }
        .sig .heart {
            font-size: 24px;
            color: #e91e63;
            display: inline-block;
            animation: heartbeat 1.6s ease-in-out infinite;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            14%  { transform: scale(1.3); }
            28%  { transform: scale(1); }
            42%  { transform: scale(1.3); }
            56%  { transform: scale(1); }
        }
        .sig .name {
            font-size: 20px;
            color: #c2185b;
            font-style: italic;
            letter-spacing: 3px;
        }
        .sig .date {
            font-size: 12px;
            color: #aaa;
            margin-top: 2px;
            letter-spacing: 2px;
        }

        /* ===== 底部花环 ===== */
        .footer-garland {
            font-size: 28px;
            letter-spacing: 8px;
            margin: 14px 0 2px;
        }
        .footer-garland span {
            display: inline-block;
            animation: fSway 3.5s ease-in-out infinite;
        }
        .footer-garland span:nth-child(1) { animation-delay: 0.0s; }
        .footer-garland span:nth-child(2) { animation-delay: 0.2s; }
        .footer-garland span:nth-child(3) { animation-delay: 0.4s; }
        .footer-garland span:nth-child(4) { animation-delay: 0.6s; }
        .footer-garland span:nth-child(5) { animation-delay: 0.8s; }
        @keyframes fSway {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            30%  { transform: translateY(-4px) rotate(3deg); }
            70%  { transform: translateY(-2px) rotate(-3deg); }
        }

        /* ===== 按钮 ===== */
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 16px;
        }
        .btn {
            border: none;
            border-radius: 50px;
            padding: 10px 28px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f06292, #e91e63);
            color: #fff;
            box-shadow: 0 4px 20px rgba(233,30,99,0.25);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(233,30,99,0.4);
        }
        .btn-outline {
            background: transparent;
            color: #c2185b;
            box-shadow: 0 0 0 2px #f06292 inset;
        }
        .btn-outline:hover {
            background: #fce4ec;
        }

        /* ===== 爱心绽放（开屏特效） ===== */
        .burst-heart {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 24px;
            animation: burstFly 1.8s ease-out forwards;
        }
        @keyframes burstFly {
            0%   { transform: translate(0, 0) scale(0.5); opacity: 1; }
            60%  { opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.2); opacity: 0; }
        }

        /* ===== 点击波纹 ===== */
        .ripple {
            position: fixed;
            border-radius: 50%;
            border: 2px solid rgba(233,30,99,0.3);
            pointer-events: none;
            z-index: 999;
            animation: rippleOut 0.8s ease-out forwards;
        }
        @keyframes rippleOut {
            0%   { transform: scale(0); opacity: 1; }
            100% { transform: scale(4); opacity: 0; }
        }

        /* ===== 跟随鼠标的星星 ===== */
        .trail {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            font-size: 14px;
            animation: trailFade 0.8s ease-out forwards;
        }
        @keyframes trailFade {
            0%   { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(10px, -20px) scale(0); opacity: 0; }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 540px) {
            .card { padding: 20px 14px 24px; }
            .inner { padding: 16px 10px 12px; }
            .hero-name { font-size: 28px; }
            .hero-sub { font-size: 15px; letter-spacing: 4px; }
            .garland { font-size: 22px; letter-spacing: 4px; }
            .photo-frame { width: 100px; height: 100px; }
            .photo-frame .ph-icon { font-size: 36px; }
            .candle-body { width: 24px; height: 56px; }
            .blessing .line { font-size: 16px; }
            .carnation-garden { gap: 8px; padding: 10px 8px; }
            .footer-garland { font-size: 22px; }
            .dual-panel { gap: 16px; }
            .ribbon { font-size: 11px; letter-spacing: 4px; height: 28px; }
            .btn { padding: 8px 20px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <!-- ===== 信封开场 ===== -->
    <div class="env-overlay" id="envOverlay">
        <div class="env-scene">
            <div class="env-box" id="envBox">
                <div class="env-inner"></div>
                <div class="env-bottom"></div>
                <div class="env-flap" id="envFlap">
                    <div class="env-seal">💗</div>
                </div>
                <div class="env-letter" id="envLetter">
                    <div class="env-l-icon">🌷</div>
                    <div class="env-l-to">给 妈妈</div>
                    <div class="env-l-sub">❤</div>
                </div>
            </div>
            <div class="env-hint">💕 点击打开</div>
        </div>
    </div>

    <!-- 卡片 -->
    <div class="card-wrapper">
        <div class="ribbon">
            <span class="r-star">✨</span>
            HAPPY MOTHER'S DAY
            <span class="r-star">✨</span>
        </div>

        <div class="card">
            <div class="inner">

                <!-- 花环 -->
                <div class="garland">
                    <span>💐</span><span>🌸</span><span>💗</span>
                    <span>🌷</span><span>💐</span><span>🌷</span>
                    <span>💗</span><span>🌸</span><span>💐</span>
                </div>

                <!-- 标题 -->
                <div class="hero-name">美丽的翟女士</div>
                <div class="hero-sub">母亲节快乐</div>
                <div class="hero-en">Happy Mother's Day</div>

                <div class="divider">
                    <span class="line"></span>
                    <span class="icon">💗</span>
                    <span class="line"></span>
                </div>

                <!-- 相框 + 蜡烛 -->
                <div class="dual-panel">
                    <div class="photo-frame" id="photoFrame" title="点击上传妈妈的照片">
                        <div class="ph-icon">🌸</div>
                        <div class="ph-label">点击放照片</div>
                        <img id="momPhoto" alt="妈妈">
                    </div>

                    <div id="heroCarnation" class="carnation-wrap">
                        <div class="carnation" style="--size:80px;"></div>
                        <div class="carnation-stem" style="height:36px;"></div>
                    </div>

                    <div class="candle-area" id="candle">
                        <div class="candle-body">
                            <div class="candle-wick"></div>
                            <div class="candle-flame"></div>
                            <div class="candle-glow-ring"></div>
                        </div>
                        <div class="candle-label">❤️ 点亮</div>
                    </div>
                </div>

                <!-- 祝福语（简短） -->
                <div class="blessing" id="blessingArea">
                    <div class="line">亲爱的妈妈，感谢您用爱照亮了我的全世界</div>
                    <div class="line highlight">愿您永远健康、快乐、被岁月温柔以待</div>
                    <div class="line">母亲节快乐，我爱您 ❤️</div>
                </div>

                <!-- 爱心矩阵 -->
                <div class="heart-grid">
                    <span class="hg-item">💗</span>
                    <span class="hg-item">❤️</span>
                    <span class="hg-item">💖</span>
                    <span class="hg-item">💕</span>
                    <span class="hg-item">💗</span>
                    <span class="hg-item">❤️</span>
                    <span class="hg-item">💖</span>
                    <span class="hg-item">💕</span>
                    <span class="hg-item">💗</span>
                    <span class="hg-item">❤️</span>
                    <span class="hg-item">💖</span>
                    <span class="hg-item">💕</span>
                </div>

                <!-- 康乃馨花圃 -->
                <div class="carnation-garden" id="carnationGarden"></div>
                </div>

                <!-- 签名 -->
                <div class="sig">
                    <div>
                        <span class="heart">💗</span>
                        <span class="name">钟天浩</span>
                    </div>
                    <div class="date">2026 · 母亲节</div>
                </div>

                <div class="divider">
                    <span class="line"></span>
                    <span class="icon">🌺</span>
                    <span class="line"></span>
                </div>

                <!-- 底部花环 -->
                <div class="footer-garland">
                    <span>🌷</span><span>🌹</span>
                    <span>🌸</span><span>🌺</span>
                    <span>💐</span>
                </div>

                <!-- 按钮 -->
                <div class="btn-group">
                    <button class="btn" id="petalBtn">🌸 花瓣雨</button>
                    <button class="btn btn-outline" id="editBtn">✏️ 改祝福</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // 0. 爱心绽放（满屏特效）
        // ============================================
        function heartBurst(count = 120) {
            const chars = ['❤️','💗','💖','💕','💓','🌸','✨','💝'];
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'burst-heart';
                el.textContent = chars[Math.floor(Math.random() * chars.length)];
                // 从屏幕随机位置出发，飞向随机方向
                const startX = Math.random() * window.innerWidth;
                const startY = Math.random() * window.innerHeight;
                const angle = Math.random() * Math.PI * 2;
                const dist = 80 + Math.random() * 400;
                el.style.cssText =
                    `left:${startX}px;top:${startY}px;` +
                    `--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;` +
                    `font-size:${18+Math.random()*36}px;` +
                    `animation-duration:${1.2+Math.random()*1.2}s;` +
                    `animation-delay:${Math.random()*0.8}s`;
                document.body.appendChild(el);
                el.addEventListener('animationend', () => el.remove());
            }
        }
        // 信封点击：掀开 → 爱心跳出 → 显示卡片
        let envOpened = false;
        document.getElementById('envBox').addEventListener('click', function(e) {
            if (envOpened) return;
            envOpened = true;

            // 点击波纹
            const rect = this.getBoundingClientRect();
            const cx = e.clientX - rect.left;
            const cy = e.clientY - rect.top;
            const ripple = document.createElement('div');
            ripple.className = 'env-click-ripple';
            ripple.style.cssText = `left:${cx}px;top:${cy}px;width:20px;height:20px;`;
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 900);

            // 1. flap 打开
            this.classList.add('open');

            // 2. 爱心满屏
            setTimeout(() => {
                heartBurst(180);
                setTimeout(() => heartBurst(120), 500);
                setTimeout(() => heartBurst(80), 1200);
                setTimeout(() => heartBurst(60), 2000);
            }, 500);

            // 3. 信封淡出
            setTimeout(() => {
                document.getElementById('envOverlay').classList.add('hidden');
            }, 1600);
        });

        // ============================================
        // 背景星星（立即启动）
        // ============================================
        function mkStar() {
            const el = document.createElement('div');
            el.className = 'star';
            const s = 2 + Math.random() * 4;
            el.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*3}s`;
            document.body.appendChild(el);
            el.addEventListener('animationend', () => el.remove());
        }
        setInterval(() => { if (Math.random() > 0.45) mkStar(); }, 350);

        // ============================================
        // 2. 花瓣雨
        // ============================================
        const PETAL_CHARS = ['🌸','💗','💖','🌷','✨','💕','🌸','💗','🌷','💖','🌸'];

        function mkPetal() {
            const el = document.createElement('div');
            el.className = 'petal';
            el.textContent = PETAL_CHARS[Math.floor(Math.random() * PETAL_CHARS.length)];
            el.style.cssText = `left:${Math.random()*100}%;font-size:${16+Math.random()*22}px;animation-duration:${6+Math.random()*8}s`;
            document.body.appendChild(el);
            el.addEventListener('animationend', () => el.remove());
        }
        for (let i = 0; i < 30; i++) setTimeout(mkPetal, i * 150);
        let petalIV = setInterval(() => { if (!document.hidden) mkPetal(); }, 400);
        document.getElementById('petalBtn').addEventListener('click', () => {
            for (let i = 0; i < 45; i++) setTimeout(mkPetal, i * 70);
        });

        // ============================================
        // 3. 光晕球
        // ============================================
        function mkGlow() {
            const el = document.createElement('div');
            el.className = 'glow-orb';
            const s = 60 + Math.random() * 120;
            el.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:-${20+Math.random()*30}px;animation-duration:${8+Math.random()*10}s`;
            document.body.appendChild(el);
            el.addEventListener('animationend', () => el.remove());
        }
        setInterval(() => { if (Math.random() > 0.55) mkGlow(); }, 500);

        // ============================================
        // 4. 相框
        // ============================================
        const pf = document.getElementById('photoFrame');
        const mPhoto = document.getElementById('momPhoto');
        pf.addEventListener('click', () => {
            const inp = document.createElement('input');
            inp.type = 'file';
            inp.accept = 'image/*';
            inp.onchange = () => {
                const f = inp.files[0];
                if (!f) return;
                const r = new FileReader();
                r.onload = e => { mPhoto.src = e.target.result; pf.classList.add('has-photo'); };
                r.readAsDataURL(f);
            };
            inp.click();
        });

        // ============================================
        // 5. 蜡烛
        // ============================================
        const candle = document.getElementById('candle');
        let candleLit = false;
        candle.addEventListener('click', () => {
            candleLit = !candleLit;
            candle.classList.toggle('lit', candleLit);
            candle.querySelector('.candle-label').textContent = candleLit ? '🔥 已点亮' : '❤️ 点亮';
        });
        // 自动点亮
        setTimeout(() => { candle.classList.add('lit'); candleLit = true; candle.querySelector('.candle-label').textContent = '🔥 已点亮'; }, 800);

        // ============================================
        // 6. 康乃馨花园
        // ============================================
        function createCarnation(size = 'sm') {
            const wrap = document.createElement('div');
            wrap.className = `carnation-wrap ${size === 'sm' ? 'carnation-sm' : ''}`;
            wrap.innerHTML = `
                <div class="carnation"></div>
                <div class="carnation-stem"></div>
            `;
            wrap.addEventListener('click', function(e) {
                // 绽放特效
                const c = this.querySelector('.carnation');
                c.style.animation = 'none';
                void c.offsetWidth;
                c.style.animation = 'carnPop 0.5s ease forwards';
                setTimeout(() => { c.style.animation = 'carnSway 3.5s ease-in-out infinite'; }, 600);
                // 散出花瓣
                for (let i = 0; i < 8; i++) {
                    const s = document.createElement('span');
                    s.textContent = ['🌸','💗','💖','🌷'][Math.floor(Math.random()*4)];
                    s.style.cssText = `position:fixed;font-size:${12+Math.random()*14}px;pointer-events:none;z-index:999;left:${e.clientX+(-25+Math.random()*50)}px;top:${e.clientY+(-25+Math.random()*50)}px;animation:trailFade 0.7s ease-out forwards;`;
                    document.body.appendChild(s);
                    setTimeout(() => s.remove(), 800);
                }
            });
            return wrap;
        }
        // 填充花园
        const garden = document.getElementById('carnationGarden');
        const carnationColors = ['#e91e63','#c2185b','#d81b60','#f06292','#ec407a','#ad1457'];
        for (let i = 0; i < 12; i++) {
            const c = createCarnation('sm');
            garden.appendChild(c);
        }

        // 英雄康乃馨点击效果
        document.getElementById('heroCarnation').addEventListener('click', function(e) {
            const c = this.querySelector('.carnation');
            c.style.animation = 'none';
            void c.offsetWidth;
            c.style.animation = 'carnPop 0.5s ease forwards';
            setTimeout(() => { c.style.animation = 'carnSway 3.5s ease-in-out infinite'; }, 600);
            // 大号花瓣散出
            for (let i = 0; i < 16; i++) {
                const s = document.createElement('span');
                s.textContent = ['🌸','💗','💖','🌷','💐','✨'][Math.floor(Math.random()*6)];
                s.style.cssText = `position:fixed;font-size:${16+Math.random()*20}px;pointer-events:none;z-index:999;left:${e.clientX+(-40+Math.random()*80)}px;top:${e.clientY+(-40+Math.random()*80)}px;animation:trailFade 0.9s ease-out forwards;`;
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 1000);
            }
        });

        // ============================================
        // 7. 鼠标拖尾星星
        // ============================================
        let trailTimer;
        document.addEventListener('mousemove', e => {
            clearTimeout(trailTimer);
            trailTimer = setTimeout(() => {
                const el = document.createElement('div');
                el.className = 'trail';
                el.textContent = ['✨','💕','🌸','💗'][Math.floor(Math.random()*4)];
                el.style.left = e.clientX + 'px';
                el.style.top = e.clientY + 'px';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 900);
            }, 60);
        });

        // ============================================
        // 8. 点击波纹
        // ============================================
        document.addEventListener('click', e => {
            const el = document.createElement('div');
            el.className = 'ripple';
            const s = 30 + Math.random() * 30;
            el.style.cssText = `width:${s}px;height:${s}px;left:${e.clientX-s/2}px;top:${e.clientY-s/2}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 900);
        });

        // ============================================
        // 9. 编辑祝福
        // ============================================
        const DEFAULT_BLESSING = document.getElementById('blessingArea').innerHTML;
        document.getElementById('editBtn').addEventListener('click', () => {
            const area = document.getElementById('blessingArea');
            const txt = prompt('想对妈妈说什么？（简短一些）', area.innerText.trim());
            if (txt && txt.trim()) {
                const lines = txt.split('\n').filter(l => l.trim());
                area.innerHTML = lines.map((l, i) =>
                    `<div class="line${i === 1 ? ' highlight' : ''}">${l.trim()}</div>`
                ).join('');
            }
        });

        // ============================================
        // 10. 可见性
        // ============================================
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) clearInterval(petalIV);
            else petalIV = setInterval(() => { if (!document.hidden) mkPetal(); }, 400);
        });

        // ============================================
        // 11. 控制台彩蛋
        // ============================================
        console.log('%c🌸 美丽的翟女士，母亲节快乐！🌸', 'font-size:22px;color:#e91e63;');
        console.log('%c💗 愿您永远健康快乐！', 'font-size:16px;color:#c2185b;');
    </script>
</body>
